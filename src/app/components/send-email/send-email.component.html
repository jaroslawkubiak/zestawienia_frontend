<div class="send-email-container">
  <div class="send-email-template-wrapper">
    <p>
      Wybierz typ wiadomości dla
      {{
        this.audience === "supplier"
          ? `dostawcy ${supplier?.company}`
          : "klienta"
      }}:
    </p>
    <p-select
      [options]="templates"
      [(ngModel)]="selectedTemplate"
      optionLabel="HTMLHeader"
      (onChange)="applyTemplate($event.value)"
      styleClass="w-full"
    >
    </p-select>
  </div>
  <div class="send-email-header">
    <div class="send-email-header-cell">
      <p class="send-email-title flex-center">Nadawca</p>
      <p class="send-email-email">{{ senderEmail }}</p>
    </div>
    <div class="send-email-header-cell">
      <p class="send-email-title flex-center">Odbiorca</p>
      <p class="send-email-email">
        {{ fullReceiverEmail }}
      </p>
    </div>
    <div class="send-email-header-cell">
      <p class="send-email-title flex-center">Temat</p>
      <p class="send-email-email">{{ emailSubject }}</p>
    </div>
  </div>
  <div class="send-email-content-container">
    <div class="send-email-preview-header">
      <div
        *ngIf="editEmailBody"
        class="send-email-btn flex-center"
        tooltipPosition="bottom"
        pTooltip="Podgląd treści"
      >
        <i class="pi pi-eye" (click)="toggleEditEmailBody()"></i>
      </div>
      <div
        *ngIf="!editEmailBody"
        class="send-email-btn flex-center"
        tooltipPosition="bottom"
        pTooltip="Edytuj treść"
      >
        <i class="pi pi-pencil" (click)="toggleEditEmailBody()"></i>
      </div>
      <label class="send-email-label flex-center">{{
        editEmailBody ? "Edytuj treść e-mail" : "Podgląd treści e-mail"
      }}</label>
      <div
        class="send-email-btn flex-center"
        [class.send-email-to-off]="isSendingDisabled"
        [class.sending-email-in-progress]="sendingInProgress"
      >
        <i
          class="pi pi-send"
          (click)="sendEmail()"
          tooltipPosition="bottom"
          pTooltip="{{ tooltipText }}"
        ></i>
      </div>
    </div>
    <div class="send-email-preview-container">
      <div class="send-email-iframe-wrapper">
        <div
          class="sending-email-is-in-progress flex-center"
          *ngIf="sendingInProgress"
        >
          <app-loading-spinner [size]="200"></app-loading-spinner>
        </div>
        <iframe
          #iframeRefHeader
          class="send-email-preview-iframe-header"
        ></iframe>
        <textarea
          *ngIf="editEmailBody"
          class="send-email-textarea"
          id="message"
          [(ngModel)]="emailMessage"
          (ngModelChange)="onMessageChange($event)"
          rows="6"
        ></textarea>
        <iframe
          *ngIf="!editEmailBody"
          #iframeRefBody
          class="send-email-preview-iframe-body"
        ></iframe>
        <iframe
          #iframeRefFooter
          class="send-email-preview-iframe-footer"
        ></iframe>
      </div>
    </div>
  </div>
</div>
