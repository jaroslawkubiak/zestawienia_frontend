<div class="list-top-action-btns">
  <p-checkbox
    size="large"
    class="m-2"
    pTooltip="Zaznacz wszystkie pliki"
    tooltipPosition="bottom"
    (click)="selectAll.emit($event)"
    [binary]="true"
  />
  <p-button
    severity="info"
    class="m-2"
    icon="pi pi-download"
    alt="Pobierz pliki"
    pTooltip="Pobierz pliki"
    [disabled]="selectedFiles.length === 0"
    (click)="downloadFiles.emit()"
  />
  <p-button
    severity="danger"
    class="m-2"
    icon="pi pi-trash"
    alt="Usuń pliki"
    pTooltip="Usuń pliki"
    [disabled]="isDeleteDisabled"
    (click)="deleteFiles.emit()"
  />
</div>
<p-table
  #dt
  dataKey="id"
  scrollable="true"
  stripedRows
  [rowTrackBy]="trackByFileId"
  [value]="files"
  [(selection)]="selectedFiles"
  [tableStyle]="{ 'min-width': '80rem' }"
  [globalFilterFields]="[
    'fileName',
    'type',
    'dir',
    'size',
    'createdAtTimestamp',
  ]"
  [rowHover]="true"
>
  <ng-template #header>
    <tr>
      <th></th>
      <th style="width: 16rem; text-align: center">Podgląd</th>
      <th pSortableColumn="fileName">Nazwa <p-sortIcon field="fileName" /></th>
      <th pSortableColumn="type" style="width: 10rem; text-align: center">
        Typ <p-sortIcon field="type" />
      </th>
      <th pSortableColumn="dir" style="width: 24rem">
        Folder <p-sortIcon field="dir" />
      </th>
      <th pSortableColumn="size" style="width: 14rem; text-align: center">
        Rozmiar <p-sortIcon field="size" />
      </th>
      <th style="width: 12rem">Wymiary</th>
      <th
        pSortableColumn="createdAtTimestamp"
        style="width: 16rem; text-align: center"
      >
        Przesłany <p-sortIcon field="createdAtTimestamp" />
      </th>
    </tr>
  </ng-template>
  <ng-template #body let-file>
    <tr class="preview-file-row">
      <td>
        <div class="preview-row-action-btns">
          <p-button
            severity="info"
            class="m-2"
            icon="pi pi-download"
            alt="Pobierz plik"
            pTooltip="Pobierz plik"
            (click)="downloadFile.emit(file.id)"
          />
          <p-tableCheckbox
            [value]="file"
            pTooltip="Zaznacz plik"
            (click)="addFileToSelected.emit(file)"
          />
          <p-button
            severity="danger"
            class="m-2"
            icon="pi pi-trash"
            alt="Usuń plik"
            pTooltip="Usuń plik"
            (click)="deleteFile.emit(file.id)"
            [disabled]="!file.canDelete || selectedFiles.length !== 0"
          />
        </div>
      </td>
      <td class="preview-file-wrapper" [ngClass]="getImageOrientation(file)">
        <div *ngIf="file | isPdf" class="preview-file-pdf">
          <app-pdf-thumbnail
            [file]="file"
            (click)="openPdf.emit(file)"
          ></app-pdf-thumbnail>
        </div>
        <div
          *ngIf="file | isImage"
          class="preview-image-wrapper"
          (click)="onShowImageClick($event, file)"
        >
          <img [src]="file.thumbnailPath" alt="Załączony plik" />
          <div class="preview-image-overlay flex-center">
            <i class="pi pi-search-plus preview-indicator"></i>
          </div>
        </div>
        <div
          class="preview-file-other"
          *ngIf="!(file | isImage) && !(file | isPdf)"
        >
          <i class="pi pi-file"></i>
        </div>
      </td>
      <td>{{ file.fileName }}</td>
      <td style="text-align: center">{{ file.type | uppercase }}</td>
      <td><i class="pi pi-folder folder-icon"></i>{{ file.dirLabel }}</td>
      <td style="text-align: center">{{ file.displaySize }}</td>
      <td style="text-align: center">{{ file.dimmensions }}</td>
      <td style="text-align: center">{{ file.createdAt }}</td>
    </tr>
  </ng-template>
</p-table>
<app-image-gallery #imageGallery></app-image-gallery>
