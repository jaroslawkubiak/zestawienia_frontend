<p-dialog
  [modal]="true"
  [(visible)]="showFilesDialog"
  [style]="{
    width: '100%',
    maxWidth: '160rem',
    maxHeight: '90%',
  }"
  [breakpoints]="{
    '640px': '100vw',
  }"
  [dismissableMask]="true"
  styleClass="mobile-full-dialog"
>
  <ng-template pTemplate="header">
    <span class="dialog-header" *ngIf="!isMobile"
      >Pliki dołączone do zestawienia: {{ set.name }}</span
    >
    <span class="dialog-header" *ngIf="isMobile">Pliki</span>
  </ng-template>

  <div class="file-wrapper">
    <div class="file-top-action-btn">
      <p-checkbox
        size="large"
        pTooltip="Zaznacz wszystkie pliki"
        tooltipPosition="bottom"
        (onChange)="selectAll($event)"
        [binary]="true"
        [ngModel]="allSelected"
        [disabled]="files.length === 0"
      />
      <p-button
        severity="info"
        icon="pi pi-download"
        alt="Pobierz pliki"
        pTooltip="Pobierz pliki"
        tooltipPosition="bottom"
        (click)="downloadFiles()"
        [disabled]="selectedFiles.length === 0"
      />
      <p-button
        severity="danger"
        icon="pi pi-trash"
        alt="Usuń pliki"
        pTooltip="Usuń pliki"
        tooltipPosition="bottom"
        [disabled]="isDeleteDisabled"
        (click)="onDeleteFiles()"
      />
    </div>
    <div class="file-change-view-mode-btn" *ngIf="!isMobile">
      <i
        class="pi pi-th-large"
        (click)="changeView('icons')"
        [ngClass]="{ active: defaultView === 'icons' }"
        pTooltip="Widok ikon"
        tooltipPosition="bottom"
      ></i>
      <i
        class="pi pi-list"
        (click)="changeView('list')"
        [ngClass]="{ active: defaultView === 'list' }"
        pTooltip="Widok listy"
        tooltipPosition="bottom"
      ></i>
    </div>
    <div *ngIf="files.length > 0">
      <app-icons-view
        *ngIf="defaultView === 'icons'"
        [who]="who"
        [files]="files"
        [selectedFiles]="selectedFiles"
        [uniqueDir]="uniqueDir"
        [deleteFile]="deleteFile.bind(this)"
        [downloadFile]="downloadFile.bind(this)"
        [openPdf]="openPdf.bind(this)"
        [addFileToSelected]="addFileToSelected.bind(this)"
        [isMobile]="isMobile"
        (fileVisible)="onFileVisible($event)"
        (selectFilesFromDirectory)="selectFilesFromDirectory($event)"
      ></app-icons-view>
      <app-list-view
        *ngIf="defaultView === 'list'"
        [who]="who"
        [files]="files"
        [selectedFiles]="selectedFiles"
        (deleteFile)="deleteFile($event)"
        (downloadFile)="downloadFile($event)"
        (addFileToSelected)="addFileToSelected($event)"
        (openPdf)="openPdf($event)"
      ></app-list-view>
    </div>
    <div class="no-files" *ngIf="files.length === 0">Brak załączników</div>
  </div>
</p-dialog>

<p-dialog
  [(visible)]="displayPdf"
  [style]="{
    width: '160rem',
    height: '1000px',
  }"
  [modal]="true"
  [closable]="true"
  [dismissableMask]="true"
  [header]="'Podgląd PDF - ' + displayPdfHeader"
>
  <iframe
    *ngIf="pdfUrl"
    [src]="pdfUrl"
    width="100%"
    height="900px"
    style="border: none"
  ></iframe>
</p-dialog>
