<div #fileElement class="preview-container">
  <span class="preview-new-file-badge" *ngIf="!file.seenAt"> Nowy </span>
  <span
    class="preview-seen-file-badge"
    *ngIf="who === 'user' && file.seenAt"
    [pTooltip]="`Widziany \n${file.seenAt}`"
    tooltipPosition="bottom"
  >
    <i class="pi pi-info-circle"></i>
  </span>
  <div class="preview-file-wrapper" [ngClass]="getImageOrientation(file)">
    <div
      *ngIf="file | isImage"
      class="preview-image-wrapper"
      (click)="onShowImageClick($event, file)"
    >
      <app-loading-spinner
        *ngIf="isLoading"
        class="preview-spinner flex-center"
      ></app-loading-spinner>
      <img
        [src]="file.thumbnailPath"
        alt="Załączony plik"
        (load)="onImageLoad()"
        (error)="onImageError()"
      />
      <div class="preview-image-overlay flex-center">
        <i class="pi pi-search-plus preview-indicator"></i>
      </div>
    </div>

    <div class="preview-file-pdf flex-center" *ngIf="file | isPdf">
      <app-pdf-thumbnail
        [file]="file"
        (click)="openPdf.emit(file)"
      ></app-pdf-thumbnail>
    </div>

    <div
      class="preview-file-other flex-center"
      *ngIf="!(file | isImage) && !(file | isPdf)"
    >
      <i class="pi pi-file"></i>
    </div>
  </div>

  <div
    class="preview-file-name-label"
    [ngClass]="{ textBold: file.isSelected }"
    pTooltip="{{ file.seenAt }}"
    tooltipPosition="bottom"
  >
    {{ file.fileName }}
  </div>

  <div class="preview-action-btns">
    <p-button
      severity="info"
      class="m-2"
      icon="pi pi-download"
      alt="Pobierz plik"
      pTooltip="Pobierz plik"
      tooltipPosition="bottom"
      (click)="download.emit()"
    />
    <p-checkbox
      (onChange)="addFileToSelected.emit(file)"
      [binary]="true"
      size="large"
      pTooltip="Zaznacz plik"
      tooltipPosition="bottom"
      [ngModel]="file.isSelected"
    />
    <p-button
      severity="danger"
      class="m-2"
      icon="pi pi-trash"
      alt="Usuń plik"
      pTooltip="Usuń plik"
      tooltipPosition="bottom"
      (click)="delete.emit()"
      [disabled]="!file.canDelete || countSelectedFiles() !== 0"
    />
  </div>
</div>
