<div class="icons-top-action-btns">
  <p-checkbox
    size="large"
    pTooltip="Zaznacz wszystkie pliki"
    tooltipPosition="bottom"
    (click)="selectAll.emit($event)"
    [binary]="true"
  />
  <p-button
    severity="info"
    icon="pi pi-download"
    alt="Pobierz pliki"
    pTooltip="Pobierz pliki"
    tooltipPosition="bottom"
    [disabled]="selectedFiles.length === 0"
    (click)="downloadFiles.emit()"
  />
  <p-button
    severity="danger"
    icon="pi pi-trash"
    alt="Usuń pliki"
    pTooltip="Usuń pliki"
    tooltipPosition="bottom"
    [disabled]="isDeleteDisabled"
    (click)="deleteFiles.emit()"
  />
</div>

<div
  class="show-file-directory-wrapper"
  *ngFor="let directory of dirListWithShowOption; trackBy: trackByDir"
>
  <div
    class="directory-name-wrapper"
    (click)="toggleVisibility(directory.dirName)"
    [pTooltip]="directory.show ? 'Zwiń' : 'Rozwiń'"
    tooltipPosition="bottom"
  >
    <i class="pi pi-folder-open"></i>
    {{ directory.dirName }}
    <i class="pi pi-chevron-up" *ngIf="directory.show"></i>
    <i class="pi pi-chevron-down" *ngIf="!directory.show"></i>
    <p-badge
      *ngIf="!directory.show"
      [value]="countFilesBadge(directory.dirName)"
      severity="contrast"
      class="badge-position"
      badgeSize="large"
    ></p-badge>
  </div>

  <div class="file-container-wrapper" [class.collapsed]="!directory.show">
    <ul class="file-container">
      <li
        class="file-item"
        *ngFor="let file of filesFilteredByDir(directory.dirName)"
      >
        <app-file-preview
          [file]="file"
          [who]="who"
          [selectedFiles]="selectedFiles"
          (delete)="deleteFile(file.id)"
          (addFileToSelected)="addFileToSelected(file)"
          (download)="downloadFile(file.id)"
          (openPdf)="openPdf(file)"
          (openGalery)="openGalery(file)"
        ></app-file-preview>
      </li>
    </ul>
  </div>
</div>
<app-image-gallery #imageGallery></app-image-gallery>
